<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <style>
      *{
      margin:0;
      padding:0;
    }

    .car{
      width: 100%;
      height: 500px;
      
      position:relative;
      animation:kalia 20s linear infinite;
    }

    .car img{
      width:100%;
      height:100%;
    }

    .car .wheel{
      display:inline-block;
      width:175px;
      height:175px;
      
      border-radius:85px;
      position:absolute;
      bottom:8%;
      left:20%;
      animation:rahul 3s linear infinite ;
      


    }

         .car .wheel:last-child{
          left:64.5%;
                           }

          @keyframes rahul{
            0%{
              transform:rotate(0);
            }

            50%{
              transform:rotate(180deg);
            }

            100%{
              transform:rotate(360deg);
            }
          }

           @keyframes kalia{
            0%{
              transform:translatex(-100%);
            }

            

            100%{
              transform:translatex(200%);
            }
          }

    </style>
  </head>
  <body>

   

<!-- linear mai bhi move krwate hain-->

  <div class="car">
    <img src="https://www.hyundai.com/content/dam/hyundai/in/en/data/find-a-car/i20/Highlights/pc/i20_Modelpc.png">

    <!-- display:inline-block; kyuki span tage inline hai or iski width height nhi de skte-->
         <span class="wheel">
      <img src="carwheel.png">
    </span>
      <span class="wheel">
      <img src="carwheel.png">
    </span>
      
  </div>


   



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
  </body>
</html>
